name: Build, Pack & Publish to NuGet

on:
  workflow_dispatch:

env:  
    VERSION:  1.0.0  
    
jobs:
  build:
    name: Build Pack And Publish

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore src/**.sln
    - name: Build
      run: dotnet build src/**.sln --no-restore --configuration Release /p:Version=${{env.VERSION}}

    - name: Pack
      run: dotnet pack src/OnvifStandard/OnvifStandard.csproj  --configuration Release --no-build -o ./nupkg
      
    - name: Push package to nuget
      run: dotnet nuget push ./nupkg/*.nupkg --source https://api.nuget.org/v3/index.json  --api-key ${{ secrets.NUGET_API_KEY  }}

